networks:
  default:
    name: shannon-net

services:
  temporal:
    # Pinned version — :latest is a supply-chain risk (unpredictable upgrades,
    # possible regressions, version-specific CVEs). Bump explicitly after testing.
    image: temporalio/temporal:1.26.2
    container_name: shannon-temporal
    command: ["server", "start-dev", "--db-filename", "/home/temporal/temporal.db", "--ip", "0.0.0.0"]
    ports:
      - "127.0.0.1:7233:7233"   # gRPC — worker containers connect here
      # Temporal Web UI removed from default binding. The UI exposes workflow
      # payloads (target URLs, repo paths, agent output) without authentication.
      # Uncomment for local debugging only:
      # - "127.0.0.1:8233:8233"
    volumes:
      - temporal-data:/home/temporal
    healthcheck:
      test: ["CMD", "temporal", "operator", "cluster", "health", "--address", "localhost:7233"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # Optional: claude-code-router for multi-model support
  # Start with: ROUTER=true ./shannon start ...
  router:
    # Pinned version — same supply-chain rationale as temporal above.
    image: node:20.19-slim
    container_name: shannon-router
    profiles: ["router"]  # Only starts when explicitly requested
    command: >
      sh -c "apt-get update && apt-get install -y gettext-base &&
             npm install -g @musistudio/claude-code-router &&
             mkdir -p /root/.claude-code-router &&
             envsubst < /config/router-config.json > /root/.claude-code-router/config.json &&
             ccr start"
    ports:
      - "127.0.0.1:3456:3456"
    volumes:
      - ./apps/cli/infra/router-config.json:/config/router-config.json:ro
    environment:
      # Bind to localhost inside the container network — 0.0.0.0 is unnecessary
      # since only containers on shannon-net need to reach the router. The host
      # port binding already handles localhost exposure.
      - HOST=127.0.0.1
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - ROUTER_DEFAULT=${ROUTER_DEFAULT:-openai,gpt-4o}
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3456/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  temporal-data:
